  "bin/based",
  "bin/node",
  "bin/basectl",
  "bin/builder",
  "bin/challenger",
  "bin/consensus",
  "bin/ingress-rpc",
  "bin/audit-archiver",
  "bin/mempool-rebroadcaster",
  "bin/proposer",
  "bin/prover/nitro-host",
  "bin/prover/nitro-enclave",
  "bin/prover/zk",
  "bin/prover-registrar",
]

[workspace.metadata.cargo-udeps.ignore]
normal = ["rustls-platform-verifier"]

[workspace.lints.rust]
missing-debug-implementations = "warn"
missing-docs = "warn"
unreachable-pub = "warn"
unused-must-use = "deny"
rust-2018-idioms = "deny"
unnameable-types = "warn"

[workspace.lints.rustdoc]
all = "warn"

[workspace.lints.clippy]
# Baseline - enable all default clippy lints
all = { level = "warn", priority = -1 }

# === Performance & Cloning ===
missing-const-for-fn = "warn"
redundant-clone = "warn"
clone-on-ref-ptr = "warn"
unnecessary-to-owned = "warn"
cloned-instead-of-copied = "warn"
flat-map-option = "warn"
implicit-clone = "warn"
or-fun-call = "warn"

# === Code Style ===
wildcard-imports = "warn"
use-self = "warn"
option-if-let-else = "warn"
uninlined-format-args = "warn"
manual-string-new = "warn"
single-char-pattern = "warn"
redundant-else = "warn"
match-same-arms = "warn"

# === Safety & Documentation ===
undocumented-unsafe-blocks = "warn"
doc-markdown = "warn"

# === Debugging Artifacts ===
dbg-macro = "warn"

# === Code Quality ===
branches-sharing-code = "warn"
derive-partial-eq-without-eq = "warn"
explicit-into-iter-loop = "warn"
explicit-iter-loop = "warn"
iter-with-drain = "warn"
needless-pass-by-ref-mut = "warn"
string-lit-as-bytes = "warn"

[profile.dev]
debug = "line-tables-only"
incremental = true

[profile.hivetests]
inherits = "test"
opt-level = 3
lto = "thin"

[profile.release]
opt-level = 3
lto = "thin"
debug = "none"
strip = "symbols"
panic = "unwind"
codegen-units = 16

[profile.maxperf]
inherits = "release"
lto = "fat"
codegen-units = 1

[profile.maxperf-symbols]
inherits = "maxperf"
debug = "full"
strip = "none"

# TODO: add `rustflags = ["-Cforce-frame-pointers=yes"]` here once
# `profile-rustflags` is stabilized (tracking: rust-lang/cargo#10271)
[profile.profiling]
inherits = "release"
lto = false
debug = "line-tables-only"
strip = "none"

[profile.bench]
inherits = "profiling"

[profile.reproducible]
inherits = "release"
panic = "abort"
codegen-units = 1
incremental = false

# CI profile: optimized for fast GHA builds and minimal disk usage
[profile.ci]
inherits = "dev"
debug = false
incremental = false

