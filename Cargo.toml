[workspace.package]
version = "0.0.0"
edition = "2024"
rust-version = "1.93"
license = "MIT"
homepage = "https://github.com/base/base"
repository = "https://github.com/base/base"
exclude = [".github/"]

[workspace]
resolver = "2"
members = [
