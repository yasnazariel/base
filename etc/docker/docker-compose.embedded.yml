x-sequencer-healthcheck: &sequencer-healthcheck
  interval: 250ms
  timeout: 1s
  retries: 240
  start_period: 250ms

services:
  # Initialize data directories and p2p keys for the two additional sequencers.
  setup-l2:
    volumes:
      - ../../.devnet/l2/sequencer-1:/data/l2-sequencer-1
      - ../../.devnet/l2/sequencer-1-cl:/data/l2-sequencer-1-cl
      - ../../.devnet/l2/sequencer-2:/data/l2-sequencer-2
      - ../../.devnet/l2/sequencer-2-cl:/data/l2-sequencer-2-cl
    environment:
      - SEQ1_P2P_KEY=${SEQ1_P2P_KEY}
      - SEQ2_P2P_KEY=${SEQ2_P2P_KEY}

  # Builder CL: add embedded leadership in place of op-conductor.
  base-builder-cl:
    volumes:
      - ../../etc/docker/leadership:/leadership:ro
      - ../../.devnet/l2/builder-cl-leadership:/data/leadership
    command:
      - node
      - --chain
      - ${L2_CHAIN_ID}
      - --l1-eth-rpc
      - http://l1-el:${L1_HTTP_PORT}
      - --l1-beacon
      - http://l1-cl:${L1_CL_HTTP_PORT}
      - --l2-engine-rpc
      - ws://base-builder:${L2_BUILDER_AUTH_PORT}
      - --l2-engine-jwt-secret
      - /genesis/jwt.hex
      - --l2-config-file
      - /genesis/l2/rollup.json
      - --l1-config-file
      - /genesis/el/chain-config.json
      - --l1-slot-duration-override
      - "4"
      - --rpc.addr
      - "0.0.0.0"
      - --rpc.port
      - "${L2_BUILDER_CL_RPC_PORT}"
      - --p2p.listen.tcp
      - "${L2_BUILDER_CL_P2P_PORT}"
      - --p2p.listen.udp
      - "${L2_BUILDER_CL_P2P_PORT}"
      - --p2p.advertise.ip
      - base-builder-cl
      - --p2p.priv.path
      - /genesis/l2/builder-p2p-key.txt
      - --metrics.enabled
      - --metrics.addr
      - "0.0.0.0"
      - --metrics.port
      - "${L2_BUILDER_CL_METRICS_PORT}"
      - --mode
      - Sequencer
      - --sequencer.l1-confs
      - "0"
      - --p2p.sequencer.key
      - ${SEQUENCER_KEY}
      - --p2p.scoring
      - Off
      - --leadership.config-path
      - /leadership/leadership-config-builder.json
      - --leadership.storage-dir
      - /data/leadership

  # Sequencer 1 EL node.
  base-sequencer-1:
    image: base-builder:local
    container_name: base-sequencer-1
    entrypoint: /app/base-builder
    depends_on:
      setup-l2:
        condition: service_completed_successfully
    ports:
      - "${L2_SEQ1_HTTP_PORT}:${L2_SEQ1_HTTP_PORT}"                     # HTTP RPC
      - "${L2_SEQ1_WS_PORT}:${L2_SEQ1_WS_PORT}"                         # WebSocket
      - "${L2_SEQ1_AUTH_PORT}:${L2_SEQ1_AUTH_PORT}"                     # Auth RPC (Engine API)
      - "${L2_SEQ1_P2P_PORT}:${L2_SEQ1_P2P_PORT}"                       # P2P
      - "${L2_SEQ1_FLASHBLOCKS_PORT}:${L2_SEQ1_FLASHBLOCKS_PORT}"       # Flashblocks
      - "${L2_SEQ1_METRICS_PORT}:${L2_SEQ1_METRICS_PORT}"               # Metrics
    volumes:
      - ../../.devnet/l2/sequencer-1:/data
      - ../../.devnet/l1/configs:/genesis:ro
      - ../../.devnet/l2/configs:/genesis/l2:ro
    environment:
      - OTEL_SERVICE_NAME=base-sequencer-1
    command:
      - node
      - --chain=/genesis/l2/genesis.json
      - --datadir=/data
      - --tracing-otlp=http://jaeger:4318
      - --tracing-otlp.filter=debug,providers::state::overlay=off,trie=off
      - --telemetry.sampling-ratio=1
      - --http
      - --http.addr=0.0.0.0
      - --http.port=${L2_SEQ1_HTTP_PORT}
      - --http.api=admin,eth,web3,net,rpc,debug,txpool,miner
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=${L2_SEQ1_WS_PORT}
      - --ws.api=eth,web3,net,txpool,debug
      - --ws.origins=*
      - --authrpc.port=${L2_SEQ1_AUTH_PORT}
      - --authrpc.addr=0.0.0.0
      - --authrpc.jwtsecret=/genesis/jwt.hex
      - --port=${L2_SEQ1_P2P_PORT}
      - --discovery.port=${L2_SEQ1_P2P_PORT}
      - --p2p-secret-key-hex=${SEQ1_P2P_KEY}
      - --trusted-peers=enode://${BUILDER_ENODE_ID}@base-builder:${L2_BUILDER_P2P_PORT}
      - --trusted-peers=enode://${SEQ2_ENODE_ID}@base-sequencer-2:${L2_SEQ2_P2P_PORT}
      - --flashblocks.addr=0.0.0.0
      - --flashblocks.port=${L2_SEQ1_FLASHBLOCKS_PORT}
      - --flashblocks.block-time=200
      - --rollup.chain-block-time=2000
      - --metrics=0.0.0.0:${L2_SEQ1_METRICS_PORT}
      - --txpool.nolocals
      - --rpc.txfeecap=0
      - --rpc.gascap=600000000
      - --color=never
      - -vvv
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/${L2_SEQ1_HTTP_PORT}"]
      <<: *sequencer-healthcheck
    restart: unless-stopped

  # Sequencer 1 CL node: embedded leadership in place of op-conductor.
  base-sequencer-1-cl:
    image: base-consensus:local
    container_name: base-sequencer-1-cl
    entrypoint: /app/base-consensus
    depends_on:
      base-sequencer-1:
        condition: service_healthy
      base-builder-cl:
        condition: service_healthy
    ports:
      - "${L2_SEQ1_CL_RPC_PORT}:${L2_SEQ1_CL_RPC_PORT}"               # RPC
      - "${L2_SEQ1_CL_P2P_PORT}:${L2_SEQ1_CL_P2P_PORT}"               # P2P TCP
      - "${L2_SEQ1_CL_P2P_PORT}:${L2_SEQ1_CL_P2P_PORT}/udp"           # P2P UDP
      - "${L2_SEQ1_CL_METRICS_PORT}:${L2_SEQ1_CL_METRICS_PORT}"       # Metrics
    volumes:
      - ../../.devnet/l2/sequencer-1-cl:/data
      - ../../.devnet/l1/configs:/genesis:ro
      - ../../.devnet/l2/configs:/genesis/l2:ro
      - ../../etc/docker/leadership:/leadership:ro
      - ../../.devnet/l2/sequencer-1-cl-leadership:/data/leadership
    command:
      - node
      - --chain
      - ${L2_CHAIN_ID}
      - --l1-eth-rpc
      - http://l1-el:${L1_HTTP_PORT}
      - --l1-beacon
      - http://l1-cl:${L1_CL_HTTP_PORT}
      - --l2-engine-rpc
      - ws://base-sequencer-1:${L2_SEQ1_AUTH_PORT}
      - --l2-engine-jwt-secret
      - /genesis/jwt.hex
      - --l2-config-file
      - /genesis/l2/rollup.json
      - --l1-config-file
      - /genesis/el/chain-config.json
      - --l1-slot-duration-override
      - "4"
      - --rpc.addr
      - "0.0.0.0"
      - --rpc.port
      - "${L2_SEQ1_CL_RPC_PORT}"
      - --p2p.listen.tcp
      - "${L2_SEQ1_CL_P2P_PORT}"
      - --p2p.listen.udp
      - "${L2_SEQ1_CL_P2P_PORT}"
      - --p2p.advertise.ip
      - base-sequencer-1-cl
      - --p2p.priv.path
      - /genesis/l2/sequencer-1-p2p-key.txt
      - --metrics.enabled
      - --metrics.addr
      - "0.0.0.0"
      - --metrics.port
      - "${L2_SEQ1_CL_METRICS_PORT}"
      - --mode
      - Sequencer
      - --sequencer.l1-confs
      - "0"
      - --sequencer.stopped
      - --p2p.sequencer.key
      - ${SEQUENCER_KEY}
      - --p2p.bootnodes
      - enode://${BUILDER_ENODE_ID}@base-builder-cl:${L2_BUILDER_CL_P2P_PORT}
      - --p2p.scoring
      - Off
      - --leadership.config-path
      - /leadership/leadership-config-seq1.json
      - --leadership.storage-dir
      - /data/leadership
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${L2_SEQ1_CL_RPC_PORT}/healthz"]
      <<: *sequencer-healthcheck
    restart: unless-stopped

  # Sequencer 2 EL node.
  base-sequencer-2:
    image: base-builder:local
    container_name: base-sequencer-2
    entrypoint: /app/base-builder
    depends_on:
      setup-l2:
        condition: service_completed_successfully
    ports:
      - "${L2_SEQ2_HTTP_PORT}:${L2_SEQ2_HTTP_PORT}"                     # HTTP RPC
      - "${L2_SEQ2_WS_PORT}:${L2_SEQ2_WS_PORT}"                         # WebSocket
      - "${L2_SEQ2_AUTH_PORT}:${L2_SEQ2_AUTH_PORT}"                     # Auth RPC (Engine API)
      - "${L2_SEQ2_P2P_PORT}:${L2_SEQ2_P2P_PORT}"                       # P2P
      - "${L2_SEQ2_FLASHBLOCKS_PORT}:${L2_SEQ2_FLASHBLOCKS_PORT}"       # Flashblocks
      - "${L2_SEQ2_METRICS_PORT}:${L2_SEQ2_METRICS_PORT}"               # Metrics
    volumes:
      - ../../.devnet/l2/sequencer-2:/data
      - ../../.devnet/l1/configs:/genesis:ro
      - ../../.devnet/l2/configs:/genesis/l2:ro
    environment:
      - OTEL_SERVICE_NAME=base-sequencer-2
    command:
      - node
      - --chain=/genesis/l2/genesis.json
      - --datadir=/data
      - --tracing-otlp=http://jaeger:4318
      - --tracing-otlp.filter=debug,providers::state::overlay=off,trie=off
      - --telemetry.sampling-ratio=1
      - --http
      - --http.addr=0.0.0.0
      - --http.port=${L2_SEQ2_HTTP_PORT}
      - --http.api=admin,eth,web3,net,rpc,debug,txpool,miner
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=${L2_SEQ2_WS_PORT}
      - --ws.api=eth,web3,net,txpool,debug
      - --ws.origins=*
      - --authrpc.port=${L2_SEQ2_AUTH_PORT}
      - --authrpc.addr=0.0.0.0
      - --authrpc.jwtsecret=/genesis/jwt.hex
      - --port=${L2_SEQ2_P2P_PORT}
      - --discovery.port=${L2_SEQ2_P2P_PORT}
      - --p2p-secret-key-hex=${SEQ2_P2P_KEY}
      - --trusted-peers=enode://${BUILDER_ENODE_ID}@base-builder:${L2_BUILDER_P2P_PORT}
      - --trusted-peers=enode://${SEQ1_ENODE_ID}@base-sequencer-1:${L2_SEQ1_P2P_PORT}
      - --flashblocks.addr=0.0.0.0
      - --flashblocks.port=${L2_SEQ2_FLASHBLOCKS_PORT}
      - --flashblocks.block-time=200
      - --rollup.chain-block-time=2000
      - --metrics=0.0.0.0:${L2_SEQ2_METRICS_PORT}
      - --txpool.nolocals
      - --rpc.txfeecap=0
      - --rpc.gascap=600000000
      - --color=never
      - -vvv
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/${L2_SEQ2_HTTP_PORT}"]
      <<: *sequencer-healthcheck
    restart: unless-stopped

  # Sequencer 2 CL node: embedded leadership in place of op-conductor.
  base-sequencer-2-cl:
    image: base-consensus:local
    container_name: base-sequencer-2-cl
    entrypoint: /app/base-consensus
    depends_on:
      base-sequencer-2:
        condition: service_healthy
      base-builder-cl:
        condition: service_healthy
    ports:
      - "${L2_SEQ2_CL_RPC_PORT}:${L2_SEQ2_CL_RPC_PORT}"               # RPC
      - "${L2_SEQ2_CL_P2P_PORT}:${L2_SEQ2_CL_P2P_PORT}"               # P2P TCP
      - "${L2_SEQ2_CL_P2P_PORT}:${L2_SEQ2_CL_P2P_PORT}/udp"           # P2P UDP
      - "${L2_SEQ2_CL_METRICS_PORT}:${L2_SEQ2_CL_METRICS_PORT}"       # Metrics
    volumes:
      - ../../.devnet/l2/sequencer-2-cl:/data
      - ../../.devnet/l1/configs:/genesis:ro
      - ../../.devnet/l2/configs:/genesis/l2:ro
      - ../../etc/docker/leadership:/leadership:ro
      - ../../.devnet/l2/sequencer-2-cl-leadership:/data/leadership
    command:
      - node
      - --chain
      - ${L2_CHAIN_ID}
      - --l1-eth-rpc
      - http://l1-el:${L1_HTTP_PORT}
      - --l1-beacon
      - http://l1-cl:${L1_CL_HTTP_PORT}
      - --l2-engine-rpc
      - ws://base-sequencer-2:${L2_SEQ2_AUTH_PORT}
      - --l2-engine-jwt-secret
      - /genesis/jwt.hex
      - --l2-config-file
      - /genesis/l2/rollup.json
      - --l1-config-file
      - /genesis/el/chain-config.json
      - --l1-slot-duration-override
      - "4"
      - --rpc.addr
      - "0.0.0.0"
      - --rpc.port
      - "${L2_SEQ2_CL_RPC_PORT}"
      - --p2p.listen.tcp
      - "${L2_SEQ2_CL_P2P_PORT}"
      - --p2p.listen.udp
      - "${L2_SEQ2_CL_P2P_PORT}"
      - --p2p.advertise.ip
      - base-sequencer-2-cl
      - --p2p.priv.path
      - /genesis/l2/sequencer-2-p2p-key.txt
      - --metrics.enabled
      - --metrics.addr
      - "0.0.0.0"
      - --metrics.port
      - "${L2_SEQ2_CL_METRICS_PORT}"
      - --mode
      - Sequencer
      - --sequencer.l1-confs
      - "0"
      - --sequencer.stopped
      - --p2p.sequencer.key
      - ${SEQUENCER_KEY}
      - --p2p.bootnodes
      - enode://${BUILDER_ENODE_ID}@base-builder-cl:${L2_BUILDER_CL_P2P_PORT}
      - --p2p.scoring
      - Off
      - --leadership.config-path
      - /leadership/leadership-config-seq2.json
      - --leadership.storage-dir
      - /data/leadership
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${L2_SEQ2_CL_RPC_PORT}/healthz"]
      <<: *sequencer-healthcheck
    restart: unless-stopped
