# Vibenet UI content + per-branch config.
# This file is mounted into the nginx container and exposed at:
#   https://vibenet.base.org/config.json
#
# Edit this file and re-run `just vibe` (or just restart nginx-gateway) to
# update what devs see. No rebuild of the UI is required.
#
# NOTE: The `branch` and `commit` fields are overwritten at container build
# time by etc/vibenet/scripts/render-config.sh. Do not rely on values set
# here for those two fields.

title: "vibenet"
subtitle: "An ephemeral Base devnet for trying out in-flight features."

# Human-readable instructions shown on the landing page. Markdown is rendered
# client-side.
instructions_markdown: |
  ## Connect your wallet

  - **Chain ID:** `84538453`
  - **RPC URL:** `https://vibenet-rpc.base.org/rpc/<API_KEY>`
  - **WS URL:** `wss://vibenet-rpc.base.org/ws/<API_KEY>`
  - **Explorer:** _(not yet deployed)_

  Replace `<API_KEY>` with the key shared by the vibenet operator.

  ## Get test funds

  Use the [faucet](/faucet) to receive a small amount of testnet ETH. Rate
  limits apply per IP and per destination address.

  ## Pre-deployed contracts

  See `/contracts.json` for the live addresses of MockUSDC, EntryPoint v0.7,
  EntryPoint v0.8, SimpleAccountFactory, and MockNFT.

# Feature list shown on the landing page. Each item has a title, one-sentence
# description, and optional link.
features:
  - title: "ERC-4337 Account Abstraction"
    description: "EntryPoint v0.7 and v0.8 are pre-deployed; send UserOperations directly."
    link: "https://eips.ethereum.org/EIPS/eip-4337"
  - title: "Flashblocks"
    description: "200ms sub-block finality. Point your client at the flashblocks WS endpoint."
    link: "https://docs.base.org"
  - title: "Test USDC"
    description: "A public-mint ERC20 for testing token flows."

# Override injected at build time. Do not edit.
branch: "unknown"
commit: "unknown"
