# Vibenet UI content + per-branch config.
# This file is mounted into the nginx container and exposed at:
#   https://vibenet.base.org/config.json
#
# Edit this file and re-run `just vibe` (or just restart nginx-gateway) to
# update what devs see. No rebuild of the UI is required.
#
# NOTE: The `branch` and `commit` fields are overwritten at container build
# time by etc/vibenet/scripts/render-config.sh. Do not rely on values set
# here for those two fields.

title: "base vibenet"
subtitle: "An ephemeral Base devnet for trying out in-flight features."

# Human-readable instructions shown on the landing page. Markdown is rendered
# client-side.
instructions_markdown: |
  ## Connect your wallet

  - **Chain ID:** `84538453`
  - **RPC URL:** `https://vibenet-rpc.base.org/rpc`
  - **WS URL:** `wss://vibenet-rpc.base.org/ws`
  - **Explorer:** [vibescan](https://vibenet-explorer.base.org/)

  The RPC is currently open (no auth). Be gentle - IP-based rate limits apply.

  ## Get test funds

  Use the [faucet](/faucet) to drip testnet ETH or mint `USDV` (Vibe USD, our
  public-mint ERC-20) to any address. Rate limits apply per IP and per
  destination address.

  ## Pre-deployed contracts

  See `/contracts.json` for live addresses. Currently deployed:

  - `USDV` - Vibe USD, public-mint ERC-20 (6 decimals) for token-flow demos.
  - `NFV` - Non-Fungible Vibe, public-mint ERC-721.

  Coming soon:

  - ERC-4337 canonical EntryPoint v0.7 / v0.8 + SimpleAccountFactory.
  - Coinbase Smart Wallet factory.

  ## Block explorer

  [vibescan](https://vibenet-explorer.base.org/) is the in-house block
  explorer - browse blocks, transactions, and per-address activity feeds.
  Server-rendered, no JS required.

# Feature list shown on the landing page. Each item has a title, one-sentence
# description, and optional link.
features:
  - title: "vibescan explorer"
    description: "In-house block explorer with per-address activity feeds, indexed straight off the node."
    link: "https://vibenet-explorer.base.org/"
  - title: "USDV (Vibe USD)"
    description: "Public-mint ERC-20 for testing token flows. The faucet can mint it to any address."

# Override injected at build time. Do not edit.
branch: "unknown"
commit: "unknown"
