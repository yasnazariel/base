<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>vibenet faucet</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>vibenet faucet</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/faucet.html">Faucet</a>
      <a href="/admin/" target="_blank" rel="noopener">Admin</a>
    </nav>
  </header>

  <main>
    <section>
      <p id="faucet-status" class="muted">loading status...</p>
      <form id="drip-form">
        <label for="addr">Recipient address</label>
        <input id="addr" name="address" placeholder="0x..." required pattern="^0x[a-fA-F0-9]{40}$" />
        <button type="submit">Drip</button>
      </form>
      <pre id="drip-result"></pre>
    </section>
  </main>

  <script src="/faucet.js"></script>
</body>
</html>
