<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>base vibenet faucet</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text">base vibenet</span>
    </a>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/faucet.html">Faucet</a>
      <a href="/admin/" target="_blank" rel="noopener">Admin</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1 class="page-title">Faucet</h1>
      <p class="subtitle">Drip testnet ETH or mint USDV (Vibe USD) to any address.</p>

      <div class="chain-card">
        <div id="faucet-status" class="muted faucet-status">loading status...</div>

        <form id="drip-form" class="faucet-form">
          <label for="addr">Recipient address</label>
          <input id="addr" name="address" placeholder="0x..." required pattern="^0x[a-fA-F0-9]{40}$" />
          <div class="drip-buttons">
            <button type="submit" name="token" value="eth">Drip ETH</button>
            <button type="submit" name="token" value="usdv" class="secondary">Mint USDV</button>
          </div>
        </form>
        <pre id="drip-result" class="terminal-body drip-result"></pre>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span class="footer-spacer"></span>
    <a href="https://base.org" target="_blank" rel="noopener">base.org</a>
  </footer>

  <script src="/faucet.js"></script>
</body>
</html>
