# Load Test Configuration - Base Mainnet Fork (Swap Benchmark)
#
# Benchmarks Uniswap V3 + Aerodrome Slipstream swap throughput on an Anvil fork.
#
# Prerequisites:
#   1. Start Anvil fork:
#      anvil --fork-url https://mainnet.base.org --port 8545
#
#   2. Deploy test tokens (from crates/utilities/test-utils/contracts/):
#      forge script script/DeployTestTokenPair.s.sol:DeployTestTokenPair \
#        --rpc-url http://localhost:8545 \
#        --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
#        --broadcast
#
#   3. Update TOKEN_A and TOKEN_B below with deployed addresses from step 2.
#
#   4. Seed liquidity pools (from crates/utilities/test-utils/contracts/):
#      UNISWAP_V3_FACTORY=0x33128a8fC17869897dcE68Ed026d694621f6FDfD \
#      UNISWAP_V3_POSITION_MANAGER=0x03a520b32C04BF3bEEf7BEb72E919cf822Ed34f1 \
#      AERODROME_CL_FACTORY=0x5e7BB104d84c7CB9B682AaC2F3d509f5F406809A \
#      AERODROME_CL_POSITION_MANAGER=0x827922686190790b37229fd06084350E74485b72 \
#      TOKEN_A=<TOKEN_A_ADDRESS> \
#      TOKEN_B=<TOKEN_B_ADDRESS> \
#      forge script script/SeedDexPools.s.sol:SeedDexPools \
#        --rpc-url http://localhost:8545 \
#        --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
#        --broadcast
#
#   5. Run:
#      FUNDER_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
#      cargo run -p base-load-tests --bin base-load-test -- \
#        crates/infra/load-tests/examples/fork-swap-bench.yaml
#
# Funder key: Anvil Account #0
#   FUNDER_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80

rpc: http://localhost:8545

# Number of sender accounts
sender_count: 50

# Target gas per second — 50 senders × 250k gas/swap ≈ 12.5M GPS
target_gps: 12500000

# Test duration
duration: "60s"

# Fixed seed for reproducible results
seed: 12345

# 0.1 ETH per account (swaps cost ~250k gas each)
funding_amount: "100000000000000000"

# 10,000 tokens per sender for swap liquidity
swap_token_amount: "10000000000000000000000"

# 100% swap transactions — half Uniswap V3, half Aerodrome CL
transactions:
  - weight: 50
    type: uniswap_v3
    router: "0x2626664c2603336E57B271c5C0b26F421741e481"
    token_in: "0xC43f327Fb959b0833fe38219B843323c5acD401e"
    token_out: "0x0a2D1B99647D03874c8AacE7AD3f8A15862D0469"
  - weight: 50
    type: aerodrome_cl
    router: "0xBE6D8f0d05cC4be24d5167a3eF062215bE6D18a5"
    token_in: "0xC43f327Fb959b0833fe38219B843323c5acD401e"
    token_out: "0x0a2D1B99647D03874c8AacE7AD3f8A15862D0469"
