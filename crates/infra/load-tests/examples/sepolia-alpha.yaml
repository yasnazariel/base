# Load Test Configuration - Base Sepolia Alpha
#
# Requires FUNDER_KEY environment variable with a funded private key

rpc: https://REPLACE-ME.example.com

# WebSocket endpoints for latency tracking
rpc_ws_url: wss://REPLACE-ME.example.com
flashblocks_ws_url: "wss://sepolia-alpha.flashblocks.base.org/ws"

sender_count: 10
target_gps: 2100000
duration: "30s"
seed: 12345

# 0.01 ETH per account (covers gas for 10s at 2.1M GPS; drained after test)
funding_amount: "10000000000000000"

transactions:
  - weight: 70
    type: transfer
  - weight: 20
    type: calldata
    max_size: 256
  - weight: 10
    type: precompile
    target: sha256
