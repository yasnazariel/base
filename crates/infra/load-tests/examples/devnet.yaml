# Load Test Configuration - Local Devnet
#
# Runs against a locally running devnet (just devnet up)
# Requires FUNDER_KEY env var (for devnet, use Anvil Account #1):
#   FUNDER_KEY=0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d

# RPC endpoint for local devnet
rpc: http://localhost:8545

# WebSocket RPC endpoint for block latency tracking
rpc_ws_url: "ws://localhost:8546"

# Flashblocks websocket url (flashblock latency tracking)
flashblocks_ws_url: "ws://localhost:7111"

# Number of sender accounts
sender_count: 100

# Target gas per second (~100 simple transfers)
target_gps: 2100000

# Test duration
duration: "30s"

# Fixed seed for reproducible account generation
seed: 12345

# 0.01 ETH per account (covers gas for 30s at 2.1M GPS; drained after test)
funding_amount: "10000000000000000"

# Transaction mix
transactions:
  - weight: 70
    type: transfer
  - weight: 20
    type: calldata
    max_size: 256
  - weight: 10
    type: precompile
    target: sha256
