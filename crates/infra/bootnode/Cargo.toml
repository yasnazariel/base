[package]
name = "base-bootnode"
description = "Standalone EL + CL discv5 bootnode for the Base network"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# base
base-consensus-peers.workspace = true
base-consensus-disc.workspace = true

# reth (EL bootnode via p2p subcommand)
reth-cli-commands.workspace = true
reth-net-nat.workspace = true

# discovery
discv5 = { workspace = true, features = ["libp2p"] }

# crypto
libp2p-identity = { workspace = true, features = ["secp256k1"] }

# async
tokio = { workspace = true, features = ["sync", "rt", "macros"] }
tokio-util = { workspace = true, features = ["rt"] }

# tracing & errors
thiserror = { workspace = true, features = ["std"] }
tracing = { workspace = true, features = ["std"] }
eyre.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "test-util"] }
base-common-chains.workspace = true
tempfile.workspace = true
