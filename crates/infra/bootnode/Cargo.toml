[package]
name = "base-bootnode"
description = "Standalone EL + CL discv5 bootnode for the Base network"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# base
base-consensus-disc.workspace = true
base-consensus-peers.workspace = true

# reth (EL discovery)
reth-discv4.workspace = true
reth-discv5.workspace = true
reth-net-nat.workspace = true
reth-cli-util.workspace = true
reth-network-peers = { workspace = true, features = ["secp256k1"] }

# discovery
discv5 = { workspace = true, features = ["libp2p"] }

# crypto
secp256k1.workspace = true
libp2p-identity = { workspace = true, features = ["secp256k1"] }

# async
futures.workspace = true
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["rt"] }
tokio = { workspace = true, features = ["sync", "rt", "macros"] }

# tracing & errors
tracing = { workspace = true, features = ["std"] }
thiserror = { workspace = true, features = ["std"] }

[dev-dependencies]
tempfile.workspace = true
base-common-chains.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "test-util"] }
