[package]
name = "base-vibenet-explorer"
description = "vibescan: minimal block explorer for vibenet public devnets."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[[bin]]
name = "vibescan"
path = "src/bin/main.rs"

[dependencies]
eyre.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true, features = ["std"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "signal", "sync", "time", "fs"] }
futures.workspace = true

# HTTP
axum = { workspace = true, features = ["http1", "tokio", "json", "query"] }
askama = { workspace = true }
tower-http = { workspace = true, features = ["trace", "fs"] }

# Alloy - RPC client, primitives, types
alloy-primitives = { workspace = true, features = ["serde", "std"] }
alloy-provider = { workspace = true, features = ["ws"] }
alloy-network = { workspace = true }
alloy-rpc-types-eth = { workspace = true, features = ["serde"] }
alloy-consensus = { workspace = true }
alloy-network-primitives = { workspace = true }

# Base network: knows how to decode OP deposit txs + base receipts.
base-common-network = { workspace = true }
base-common-rpc-types = { workspace = true }

# Storage
sqlx = { workspace = true, features = ["runtime-tokio", "sqlite", "macros", "migrate"] }
hex.workspace = true
