<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}vibescan{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">vibescan</a>
    <form class="search" action="/search" method="get">
      <input type="text" name="q" placeholder="Search block / tx / address" autocomplete="off" />
      <button type="submit">→</button>
    </form>
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div>vibenet: <code>{{ ctx.branch }}</code> @ <code>{{ ctx.commit }}</code></div>
    {% match ctx.public_rpc_url %}
      {% when Some with (url) %}
        <div>RPC: <code>{{ url }}</code></div>
      {% when None %}
    {% endmatch %}
  </footer>
</body>
</html>
