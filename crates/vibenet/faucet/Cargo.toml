[package]
name = "base-vibenet-faucet"
description = "HTTP faucet service for vibenet public devnets."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[[bin]]
name = "base-vibenet-faucet"
path = "src/bin/main.rs"

[dependencies]
eyre.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true, features = ["std"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "signal", "sync", "time"] }
axum = { workspace = true, features = ["http1", "tokio", "json"] }
alloy-primitives = { workspace = true, features = ["serde", "std"] }
alloy-provider = { workspace = true }
alloy-network = { workspace = true }
alloy-signer = { workspace = true }
alloy-signer-local = { workspace = true }
alloy-rpc-types-eth = { workspace = true, features = ["serde"] }
alloy-sol-types = { workspace = true, features = ["std"] }
