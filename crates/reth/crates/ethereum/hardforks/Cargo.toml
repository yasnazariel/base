[package]
name = "reth-ethereum-forks"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Ethereum fork types used in reth."

[lints]
workspace = true

[dependencies]
# ethereum
alloy-hardforks.workspace = true
alloy-eip2124.workspace = true
alloy-primitives = { workspace = true, features = ["serde", "rlp"] }
base-alloy-chains.workspace = true

# misc
once_cell.workspace = true
rustc-hash = { workspace = true, optional = true }

# arbitrary utils
arbitrary = { workspace = true, features = ["derive"], optional = true }
auto_impl.workspace = true

[dev-dependencies]
arbitrary = { workspace = true, features = ["derive"] }

[features]
default = [ "rustc-hash", "serde", "std" ]
arbitrary = [
	"alloy-eip2124/arbitrary",
	"alloy-primitives/arbitrary",
	"dep:arbitrary",
]
serde = [
	"alloy-eip2124/serde",
	"alloy-hardforks/serde",
	"alloy-primitives/serde",
]
std = [
	"alloy-eip2124/std",
	"alloy-primitives/std",
	"once_cell/std",
	"rustc-hash/std",
]
rustc-hash = [ "dep:rustc-hash" ]
