[package]
name = "reth-primitives-traits"
version.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Common types in reth."

[lints]
workspace = true

[dependencies]
# reth
reth-codecs = { workspace = true, optional = true }

# ethereum
alloy-consensus = { workspace = true, features = ["k256"] }
alloy-eips.workspace = true
alloy-genesis.workspace = true
alloy-primitives = { workspace = true, features = ["k256"] }
alloy-rlp.workspace = true
alloy-trie.workspace = true
revm-primitives.workspace = true
revm-bytecode.workspace = true
revm-state.workspace = true

# crypto
secp256k1 = { workspace = true, features = ["recovery"], optional = true }

# misc
auto_impl.workspace = true
byteorder = { workspace = true, optional = true }
bytes.workspace = true
dashmap = { workspace = true, features = ["inline"], optional = true }
derive_more.workspace = true
once_cell.workspace = true
serde_with = { workspace = true, optional = true }
thiserror.workspace = true

# required by reth-codecs
modular-bitfield = { workspace = true, optional = true }
serde = { workspace = true, optional = true }

# arbitrary utils
arbitrary = { workspace = true, features = ["derive"], optional = true }
proptest = { workspace = true, optional = true }
proptest-arbitrary-interop = { workspace = true, optional = true }
rayon = { workspace = true, optional = true }
alloy-rpc-types-eth = { workspace = true, optional = true }

[dev-dependencies]
reth-codecs.workspace = true
reth-chainspec = { workspace = true, features = ["arbitrary"] }

alloy-primitives = { workspace = true, features = ["arbitrary", "serde"] }
alloy-consensus = { workspace = true, features = ["arbitrary", "serde"] }

arbitrary = { workspace = true, features = ["derive"] }
secp256k1 = { workspace = true, features = ["recovery", "global-context", "rand"] }
bincode = { workspace = true, features = ["serde"] }
byteorder.workspace = true
proptest-arbitrary-interop.workspace = true
proptest.workspace = true
rand.workspace = true
rand_08.workspace = true
serde.workspace = true
serde_json.workspace = true

[features]
default = [ "std" ]
std = [
	"alloy-consensus/std",
	"alloy-eips/std",
	"alloy-genesis/std",
	"alloy-primitives/std",
	"alloy-rlp/std",
	"alloy-rpc-types-eth?/std",
	"alloy-trie/std",
	"bytes/std",
	"derive_more/std",
	"once_cell/std",
	"reth-chainspec/std",
	"revm-bytecode/std",
	"revm-primitives/std",
	"revm-state/std",
	"secp256k1?/std",
	"serde?/std",
	"serde_json/std",
	"serde_with?/std",
	"thiserror/std",
]
secp256k1 = [ "alloy-consensus/secp256k1" ]
test-utils = [
	"arbitrary",
	"reth-chainspec/test-utils",
	"reth-codecs?/test-utils",
]
arbitrary = [
	"alloy-consensus/arbitrary",
	"alloy-eips/arbitrary",
	"alloy-primitives/arbitrary",
	"alloy-rpc-types-eth?/arbitrary",
	"alloy-trie/arbitrary",
	"dashmap?/arbitrary",
	"dep:arbitrary",
	"dep:proptest",
	"dep:proptest-arbitrary-interop",
	"reth-chainspec/arbitrary",
	"reth-codecs?/arbitrary",
	"revm-primitives/arbitrary",
	"secp256k1?/global-context",
	"secp256k1?/rand",
	"std",
]
serde-bincode-compat = [
	"alloy-consensus/serde-bincode-compat",
	"alloy-eips/serde-bincode-compat",
	"alloy-genesis/serde-bincode-compat",
	"alloy-rpc-types-eth?/serde-bincode-compat",
	"serde",
	"serde_with",
]
serde = [
	"alloy-consensus/serde",
	"alloy-eips/serde",
	"alloy-primitives/serde",
	"alloy-rpc-types-eth?/serde",
	"alloy-trie/serde",
	"bytes/serde",
	"dashmap?/serde",
	"dep:serde",
	"rand/serde",
	"rand_08/serde",
	"reth-codecs?/serde",
	"revm-bytecode/serde",
	"revm-primitives/serde",
	"revm-state/serde",
	"secp256k1?/serde",
]
reth-codec = [ "dep:byteorder", "dep:modular-bitfield", "dep:reth-codecs" ]
rayon = [ "dep:rayon" ]
dashmap = [ "dep:dashmap" ]
rpc-compat = [ "alloy-rpc-types-eth" ]
