[package]
name = "reth-primitives"
version.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Commonly used types in reth."

[lints]
workspace = true

[dependencies]
# reth
reth-ethereum-primitives = { workspace = true, features = ["serde"] }
reth-primitives-traits.workspace = true
reth-ethereum-forks.workspace = true
reth-static-file-types.workspace = true

# ethereum
alloy-consensus.workspace = true
alloy-primitives = { workspace = true, optional = true }
alloy-rlp = { workspace = true, optional = true }
alloy-eips = { workspace = true, optional = true }
alloy-genesis = { workspace = true, optional = true }

# for eip-4844
c-kzg = { workspace = true, features = ["serde"], optional = true }

# misc
once_cell.workspace = true
reth-codecs = { workspace = true, optional = true }

[dev-dependencies]
# eth
reth-primitives-traits = { workspace = true, features = ["arbitrary", "test-utils"] }

alloy-eips = { workspace = true, features = ["arbitrary"] }

arbitrary = { workspace = true, features = ["derive"] }

proptest-arbitrary-interop.workspace = true
proptest.workspace = true

criterion.workspace = true

[features]
default = [ "alloy-compat", "c-kzg", "reth-codec", "secp256k1", "std" ]
std = [
	"alloy-consensus/std",
	"alloy-eips/std",
	"alloy-genesis/std",
	"alloy-primitives/std",
	"alloy-rlp/std",
	"once_cell/std",
	"reth-ethereum-forks/std",
	"reth-ethereum-primitives/std",
	"reth-primitives-traits/std",
	"reth-static-file-types/std",
]
reth-codec = [
	"reth-ethereum-primitives/reth-codec",
	"reth-primitives-traits/reth-codec",
	"std",
]
asm-keccak = [ "alloy-primitives/asm-keccak" ]
arbitrary = [
	"alloy-consensus/arbitrary",
	"alloy-eips/arbitrary",
	"alloy-primitives/arbitrary",
	"c-kzg?/arbitrary",
	"reth-codec",
	"reth-codecs/arbitrary",
	"reth-ethereum-forks/arbitrary",
	"reth-ethereum-primitives/arbitrary",
	"reth-primitives-traits/arbitrary",
]
secp256k1 = [ "reth-primitives-traits/secp256k1" ]
c-kzg = [ "alloy-consensus/kzg", "alloy-eips/kzg", "dep:c-kzg" ]
alloy-compat = []
test-utils = [
	"arbitrary",
	"reth-codecs/test-utils",
	"reth-ethereum-primitives/test-utils",
	"reth-primitives-traits/test-utils",
]
serde-bincode-compat = [
	"alloy-consensus/serde-bincode-compat",
	"alloy-eips/serde-bincode-compat",
	"alloy-genesis/serde-bincode-compat",
	"reth-ethereum-primitives/serde-bincode-compat",
	"reth-primitives-traits/serde-bincode-compat",
]

[[bench]]
name = "recover_ecdsa_crit"
harness = false

[[bench]]
name = "validate_blob_tx"
required-features = ["arbitrary", "c-kzg"]
harness = false
