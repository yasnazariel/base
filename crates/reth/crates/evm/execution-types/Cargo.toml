[package]
name = "reth-execution-types"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
reth-ethereum-primitives.workspace = true
reth-primitives-traits.workspace = true
reth-trie-common.workspace = true

revm.workspace = true

# alloy
alloy-evm.workspace = true
alloy-consensus.workspace = true
alloy-primitives.workspace = true
alloy-eips.workspace = true

serde = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true }

derive_more.workspace = true

[dev-dependencies]
reth-primitives-traits = { workspace = true, features = ["test-utils", "arbitrary"] }
reth-ethereum-primitives = { workspace = true, features = ["arbitrary"] }
alloy-primitives = { workspace = true, features = ["rand", "arbitrary"] }
arbitrary.workspace = true
bincode = { workspace = true, features = ["serde"] }
rand.workspace = true

[features]
default = [ "std" ]
serde = [
	"alloy-consensus/serde",
	"alloy-eips/serde",
	"alloy-primitives/serde",
	"dep:serde",
	"rand/serde",
	"reth-ethereum-primitives/serde",
	"reth-primitives-traits/serde",
	"reth-trie-common/serde",
	"revm/serde",
]
serde-bincode-compat = [
	"alloy-consensus/serde-bincode-compat",
	"alloy-eips/serde-bincode-compat",
	"reth-ethereum-primitives/serde-bincode-compat",
	"reth-primitives-traits/serde-bincode-compat",
	"reth-trie-common/serde-bincode-compat",
	"serde",
	"serde_with",
]
std = [
	"alloy-consensus/std",
	"alloy-eips/std",
	"alloy-evm/std",
	"alloy-primitives/std",
	"derive_more/std",
	"reth-ethereum-primitives/std",
	"reth-primitives-traits/std",
	"reth-trie-common/std",
	"revm/std",
	"serde?/std",
	"serde_with?/std",
]
