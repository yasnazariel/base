[package]
name = "base-execution-rpc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Ethereum RPC implementation for Base."

[lints]
workspace = true

[dependencies]
# reth
reth-evm.workspace = true
reth-rpc.workspace = true
reth-revm.workspace = true
reth-provider.workspace = true
reth-rpc-api.workspace = true
reth-chainspec.workspace = true
reth-storage-api.workspace = true
reth-node-api.workspace = true
reth-payload-util.workspace = true
reth-chain-state.workspace = true
reth-rpc-eth-api.workspace = true
reth-rpc-eth-types.workspace = true
reth-node-builder.workspace = true
reth-rpc-engine-api.workspace = true
reth-primitives-traits.workspace = true
reth-transaction-pool.workspace = true
reth-rpc-server-types.workspace = true
reth-basic-payload-builder.workspace = true
reth-tasks = { workspace = true, features = ["rayon"] }

# op-reth
base-txpool.workspace = true
base-execution-trie.workspace = true
base-execution-payload-builder.workspace = true

# ethereum
revm.workspace = true
alloy-rlp.workspace = true
alloy-eips.workspace = true
alloy-serde.workspace = true
base-evm = { workspace = true, features = ["reth"] }
alloy-json-rpc.workspace = true
alloy-primitives.workspace = true
alloy-rpc-client.workspace = true
alloy-transport.workspace = true
alloy-consensus.workspace = true
alloy-rpc-types-eth.workspace = true
alloy-rpc-types-debug.workspace = true
alloy-transport-http.workspace = true
alloy-rpc-types-engine.workspace = true
base-alloy-chains.workspace = true
base-alloy-flz.workspace = true
base-alloy-consensus = { workspace = true, features = ["reth"] }
base-alloy-rpc-jsonrpsee.workspace = true
base-alloy-network = { workspace = true, features = ["reth"] }
base-common-rpc-types = { workspace = true, features = ["reth"] }
base-alloy-rpc-types-engine = { workspace = true, features = ["reth"] }

# async
serde.workspace = true
tokio.workspace = true
futures.workspace = true
async-trait.workspace = true

# rpc
jsonrpsee.workspace = true
jsonrpsee-core.workspace = true
jsonrpsee-types.workspace = true

# misc
eyre.workspace = true
tracing.workspace = true
thiserror.workspace = true
derive_more = { workspace = true, features = ["constructor"] }

# metrics
metrics = { workspace = true, optional = true }
base-metrics.workspace = true

[dev-dependencies]
base-execution-chainspec.workspace = true

[features]
default = [ "metrics" ]
client = [
	"jsonrpsee/async-client",
	"jsonrpsee/client",
	"reth-rpc-eth-api/client",
]
metrics = [
	"base-execution-trie/metrics",
	"base-metrics/metrics",
	"dep:metrics",
	"reth-evm/metrics",
]
