[package]
name = "base-flashblocks"
description = "Flashblocks State Management"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# workspace
base-alloy-flashblocks.workspace = true
alloy-evm = { workspace = true, features = ["std"] }
base-evm = { workspace = true, features = ["reth"] }

# reth
reth-rpc.workspace = true
reth-evm.workspace = true
reth-revm.workspace = true
reth-provider.workspace = true
reth-chainspec.workspace = true
reth-primitives.workspace = true
reth-rpc-convert.workspace = true
reth-rpc-eth-api.workspace = true
reth-trie-common.workspace = true
base-execution-rpc.workspace = true
reth-rpc-eth-types.workspace = true

# revm
revm.workspace = true
revm-database.workspace = true

# alloy
alloy-network.workspace = true
alloy-provider.workspace = true
alloy-rpc-types.workspace = true
alloy-primitives.workspace = true
alloy-eips = { workspace = true, features = ["std"] }
alloy-consensus = { workspace = true, features = ["std"] }
alloy-rpc-types-eth = { workspace = true, features = ["std"] }
alloy-rpc-types-engine = { workspace = true, features = ["std"] }

# base-alloy
base-alloy-rpc-types-engine.workspace = true

# base-alloy
base-alloy-flz.workspace = true
base-alloy-chains.workspace = true
base-alloy-network.workspace = true
base-alloy-consensus = { workspace = true, features = ["reth"] }
base-common-rpc-types.workspace = true

# tokio
tokio.workspace = true
tokio-stream.workspace = true
tokio-tungstenite = { workspace = true, features = ["native-tls"] }

# async
futures.workspace = true

# rpc
jsonrpsee.workspace = true
jsonrpsee-types.workspace = true
serde = { workspace = true, features = ["std"] }

# metrics
metrics = { workspace = true, optional = true }
base-metrics.workspace = true

# misc
url.workspace = true
rayon.workspace = true
arc-swap.workspace = true
tracing = { workspace = true, features = ["std"] }
thiserror = { workspace = true, features = ["std"] }
derive_more = { workspace = true, features = ["from"] }

[dev-dependencies]
rstest.workspace = true
alloy-eips.workspace = true
serde_json.workspace = true
base-execution-chainspec.workspace = true

[features]
default = [ "metrics" ]
metrics = [ "base-metrics/metrics", "dep:metrics", "reth-evm/metrics" ]
