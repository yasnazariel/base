[package]
name = "reth-cli-commands"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]

[dependencies]
# reth
reth-chainspec.workspace = true
reth-ethereum-forks.workspace = true
reth-cli.workspace = true
reth-cli-runner.workspace = true
reth-cli-util.workspace = true
reth-codecs.workspace = true
reth-config = { workspace = true, features = ["serde"] }
reth-consensus.workspace = true
reth-db = { workspace = true, features = ["mdbx"] }
reth-db-api.workspace = true
reth-db-common.workspace = true
reth-downloaders = { workspace = true, features = ["file-client"] }
reth-ecies.workspace = true
reth-eth-wire.workspace = true
reth-evm.workspace = true
reth-exex.workspace = true
reth-fs-util.workspace = true
reth-net-nat.workspace = true
reth-network = { workspace = true, features = ["serde"] }
reth-network-p2p.workspace = true
reth-network-peers = { workspace = true, features = ["secp256k1"] }
reth-node-api.workspace = true
reth-node-builder.workspace = true
reth-node-core.workspace = true
reth-node-types.workspace = true
reth-node-events.workspace = true
reth-node-metrics.workspace = true
reth-ethereum-primitives = { workspace = true, optional = true }
reth-provider.workspace = true
reth-prune.workspace = true
reth-prune-types.workspace = true
reth-revm.workspace = true
reth-stages.workspace = true
reth-stages-api.workspace = true
reth-stages-types.workspace = true
reth-static-file-types = { workspace = true, features = ["clap"] }
reth-static-file.workspace = true
reth-tasks.workspace = true
reth-storage-api.workspace = true
reth-trie = { workspace = true, features = ["metrics"] }
reth-trie-db = { workspace = true, features = ["metrics"] }
reth-trie-common.workspace = true
reth-primitives-traits.workspace = true
reth-discv4.workspace = true
reth-discv5.workspace = true

# ethereum
alloy-eips.workspace = true
alloy-primitives = { workspace = true, features = ["map-foldhash"] }
alloy-rlp.workspace = true
alloy-consensus.workspace = true

itertools.workspace = true
futures.workspace = true
tokio.workspace = true

# misc
humantime.workspace = true
human_bytes.workspace = true
eyre.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
lz4.workspace = true
zstd.workspace = true
serde.workspace = true
serde_json.workspace = true
tar.workspace = true
tracing.workspace = true
backon.workspace = true
secp256k1 = { workspace = true, features = ["global-context", "std", "recovery"] }
tokio-stream.workspace = true
reqwest.workspace = true
url.workspace = true
metrics.workspace = true

# io
fdlimit.workspace = true
toml = { workspace = true, features = ["display"] }

# tui
comfy-table.workspace = true
crossterm.workspace = true
ratatui = { workspace = true, features = ["crossterm"] }

# reth test-vectors
proptest = { workspace = true, optional = true }
arbitrary = { workspace = true, optional = true }
proptest-arbitrary-interop = { workspace = true, optional = true }

[dev-dependencies]
reth-ethereum-cli.workspace = true
reth-provider = { workspace = true, features = ["test-utils"] }
tempfile.workspace = true

[features]
default = []
arbitrary = [
	"alloy-consensus/arbitrary",
	"alloy-eips/arbitrary",
	"alloy-primitives/arbitrary",
	"dep:arbitrary",
	"dep:proptest",
	"dep:proptest-arbitrary-interop",
	"reth-chainspec/arbitrary",
	"reth-codecs/arbitrary",
	"reth-codecs/test-utils",
	"reth-db-api/arbitrary",
	"reth-db/arbitrary",
	"reth-eth-wire/arbitrary",
	"reth-ethereum-primitives/arbitrary",
	"reth-primitives-traits/arbitrary",
	"reth-prune-types/test-utils",
	"reth-prune-types/arbitrary",
	"reth-stages-types/test-utils",
	"reth-stages-types/arbitrary",
	"reth-trie-common/arbitrary",
	"reth-trie-common/test-utils",
]

rocksdb = [
	"reth-db-common/rocksdb",
	"reth-provider/rocksdb",
	"reth-prune/rocksdb",
	"reth-stages/rocksdb",
]
edge = [ "rocksdb" ]
