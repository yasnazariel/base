[package]
name = "reth-evm-ethereum"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# Reth
reth-execution-errors.workspace = true
reth-execution-types.workspace = true
reth-chainspec.workspace = true
reth-ethereum-forks.workspace = true
reth-primitives-traits.workspace = true
reth-ethereum-primitives.workspace = true
reth-primitives.workspace = true
revm.workspace = true
reth-evm.workspace = true
reth-storage-errors.workspace = true

# Base
base-alloy-chains.workspace = true
base-alloy-consensus = { workspace = true, features = ["evm"] }
base-alloy-evm = { workspace = true, features = ["reth"] }
base-alloy-rpc-types-engine = { workspace = true, features = ["reth"] }
base-execution-consensus.workspace = true
reth-revm = { workspace = true, features = ["reth"] }

# Alloy
alloy-primitives.workspace = true
alloy-eips.workspace = true
alloy-evm.workspace = true
alloy-consensus.workspace = true
alloy-rpc-types-engine.workspace = true

# Misc
parking_lot = { workspace = true, optional = true }
derive_more = { workspace = true, optional = true }
thiserror.workspace = true

[dev-dependencies]
reth-testing-utils.workspace = true
reth-evm = { workspace = true, features = ["test-utils"] }
secp256k1.workspace = true
alloy-genesis.workspace = true

[features]
default = [ "std" ]
std = [
	"alloy-consensus/std",
	"alloy-eips/std",
	"alloy-evm/std",
	"alloy-genesis/std",
	"alloy-primitives/std",
	"alloy-rpc-types-engine/std",
	"base-alloy-consensus/std",
	"base-alloy-evm/std",
	"base-alloy-rpc-types-engine/std",
	"base-execution-consensus/std",
	"derive_more?/std",
	"reth-chainspec/std",
	"reth-ethereum-forks/std",
	"reth-ethereum-primitives/std",
	"reth-evm/std",
	"reth-execution-errors/std",
	"reth-execution-types/std",
	"reth-primitives-traits/std",
	"reth-primitives/std",
	"reth-revm/std",
	"reth-storage-errors/std",
	"revm/std",
	"secp256k1/std",
	"thiserror/std",
]
test-utils = [
	"dep:derive_more",
	"dep:parking_lot",
	"reth-chainspec/test-utils",
	"reth-ethereum-primitives/test-utils",
	"reth-evm/test-utils",
	"reth-primitives-traits/test-utils",
	"std",
]
portable = [ "reth-revm/portable", "revm/portable" ]
rpc = [
	"alloy-evm/rpc",
	"reth-primitives/reth-codec",
	"reth-primitives/serde",
	"std",
]
