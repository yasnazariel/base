[package]
name = "reth-ethereum-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# reth
reth-cli.workspace = true
reth-cli-commands.workspace = true
reth-cli-runner.workspace = true
reth-chainspec.workspace = true
reth-ethereum-consensus.workspace = true
reth-ethereum-forks.workspace = true
reth-db.workspace = true
reth-node-builder.workspace = true
reth-node-core.workspace = true
reth-node-ethereum.workspace = true
reth-node-metrics.workspace = true
reth-primitives-traits.workspace = true
reth-rpc-server-types.workspace = true
reth-tasks.workspace = true
reth-tracing.workspace = true

# misc
clap.workspace = true
eyre.workspace = true
tracing.workspace = true

[dev-dependencies]
# fs
tempfile.workspace = true

[features]
default = []

otlp = [ "reth-node-core/otlp", "reth-tracing/otlp" ]
otlp-logs = [ "reth-node-core/otlp-logs", "reth-tracing/otlp-logs" ]

dev = [ "reth-cli-commands/arbitrary" ]

asm-keccak = [ "reth-node-core/asm-keccak", "reth-node-ethereum/asm-keccak" ]

jemalloc = [ "reth-node-core/jemalloc", "reth-node-metrics/jemalloc" ]
jemalloc-prof = [ "jemalloc", "reth-node-metrics/jemalloc-prof" ]
jemalloc-symbols = [ "jemalloc-prof", "reth-node-metrics/jemalloc-symbols" ]
tracy-allocator = [ "tracy" ]
tracy = [ "reth-node-core/tracy", "reth-tracing/tracy" ]

# Because jemalloc is default and preferred over snmalloc when both features are
# enabled, `--no-default-features` should be used when enabling snmalloc or
# snmalloc-native.
snmalloc = []
snmalloc-native = []

min-error-logs = [
	"reth-node-core/min-error-logs",
	"tracing/release_max_level_error",
]
min-warn-logs = [
	"reth-node-core/min-warn-logs",
	"tracing/release_max_level_warn",
]
min-info-logs = [
	"reth-node-core/min-info-logs",
	"tracing/release_max_level_info",
]
min-debug-logs = [
	"reth-node-core/min-debug-logs",
	"tracing/release_max_level_debug",
]
min-trace-logs = [
	"reth-node-core/min-trace-logs",
	"tracing/release_max_level_trace",
]

rocksdb = [ "reth-cli-commands/rocksdb" ]
edge = [ "rocksdb" ]
