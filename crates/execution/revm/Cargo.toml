[package]
name = "reth-revm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "reth specific revm utilities"

[lints]
workspace = true

[dependencies]
# reth
reth-evm = { path = "../evm", default-features = false, optional = true }
reth-primitives-traits = { path = "../../core/primitives-traits", default-features = false, optional = true }
reth-storage-errors = { path = "../../core/storage-errors", default-features = false, optional = true }
reth-storage-api = { path = "../../core/storage-api", default-features = false, optional = true }
reth-trie = { path = "../trie-base/trie", default-features = false, optional = true }

# alloy
alloy-evm = { workspace = true, optional = true }
alloy-primitives.workspace = true

# base
base-alloy-flz = { workspace = true, default-features = false }
base-consensus-genesis.workspace = true

# revm
revm.workspace = true

# misc
auto_impl.workspace = true
serde = { workspace = true, features = ["derive", "rc"], optional = true }

[dev-dependencies]
alloy-consensus.workspace = true
alloy-sol-types = { workspace = true, default-features = false }
reth-ethereum-forks.workspace = true
reth-trie.workspace = true
rstest.workspace = true
serde = { workspace = true, features = ["derive", "rc"] }
serde_json = { workspace = true, default-features = false, features = ["alloc", "preserve_order"] }

[features]
default = [ "std" ]
std = [
	"alloy-consensus/std",
	"alloy-evm?/std",
	"alloy-primitives/std",
	"alloy-sol-types/std",
	"base-alloy-flz/std",
	"base-consensus-genesis/std",
	"database",
	"reth-ethereum-forks/std",
	"reth-evm?/std",
	"reth-primitives-traits?/std",
	"reth-storage-api/std",
	"reth-storage-errors/std",
	"revm/std",
	"serde?/std",
]
database = [
	"dep:reth-primitives-traits",
	"dep:reth-storage-api",
	"dep:reth-storage-errors",
]
dev = [
	"memory_limit",
	"optional_balance_check",
	"optional_block_gas_limit",
	"optional_eip3541",
	"optional_eip3607",
	"optional_no_base_fee",
]
witness = [ "dep:reth-trie" ]
test-utils = [
	"database",
	"dep:reth-trie",
	"reth-primitives-traits?/test-utils",
	"reth-trie?/test-utils",
	"std",
]
serde = [
	"alloy-consensus/serde",
	"alloy-primitives/serde",
	"base-consensus-genesis/serde",
	"dep:serde",
	"reth-ethereum-forks/serde",
	"reth-primitives-traits?/serde",
	"reth-storage-api?/serde",
	"reth-trie?/serde",
	"revm/serde",
]
alloy = [ "dep:alloy-evm" ]
reth = [ "alloy", "dep:reth-evm" ]
bn = [ "revm/bn" ]
blst = [ "revm/blst" ]
c-kzg = [ "revm/c-kzg" ]
portable = [ "revm/portable" ]
secp256k1 = [ "revm/secp256k1" ]
optional-balance-check = [ "revm/optional_balance_check" ]
optional_balance_check = [ "optional-balance-check" ]
optional-block-gas-limit = [ "revm/optional_block_gas_limit" ]
optional_block_gas_limit = [ "optional-block-gas-limit" ]
optional-eip3541 = [ "revm/optional_eip3541" ]
optional_eip3541 = [ "optional-eip3541" ]
optional-eip3607 = [ "revm/optional_eip3607" ]
optional_eip3607 = [ "optional-eip3607" ]
optional-fee-charge = [ "revm/optional_fee_charge" ]
optional_fee_charge = [ "optional-fee-charge" ]
optional-no-base-fee = [ "revm/optional_no_base_fee" ]
optional_no_base_fee = [ "optional-no-base-fee" ]
optional-checks = [
	"optional-balance-check",
	"optional-block-gas-limit",
	"optional-eip3541",
	"optional-eip3607",
	"optional-no-base-fee",
]
memory_limit = [ "revm/memory_limit" ]
