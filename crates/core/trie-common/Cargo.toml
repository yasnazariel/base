[package]
name = "reth-trie-common"
version.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Commonly used types for trie usage in reth."

[lints]
workspace = true

[dependencies]
# alloy
alloy-primitives.workspace = true
alloy-rlp = { workspace = true, features = ["arrayvec"] }
alloy-trie = { workspace = true, features = ["ethereum"] }
alloy-consensus.workspace = true
reth-primitives-traits.workspace = true
reth-codecs = { workspace = true, optional = true }

alloy-rpc-types-eth = { workspace = true, optional = true }
alloy-serde = { workspace = true, optional = true }

arrayvec = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
derive_more.workspace = true
itertools = { workspace = true, features = ["use_alloc"] }
nybbles = { workspace = true, features = ["rlp"] }

# reth
revm-database.workspace = true

# `serde` feature
serde = { workspace = true, optional = true }

serde_with = { workspace = true, optional = true }

# `test-utils` feature
hash-db = { workspace = true, optional = true }
plain_hasher = { workspace = true, optional = true }
arbitrary = { workspace = true, features = ["derive"], optional = true }

# misc
rayon = { workspace = true, optional = true }

[dev-dependencies]
reth-primitives-traits = { workspace = true, features = ["serde"] }
reth-codecs.workspace = true
alloy-genesis.workspace = true

alloy-primitives = { workspace = true, features = ["getrandom"] }
alloy-trie = { workspace = true, features = ["arbitrary", "serde"] }
bytes.workspace = true
arrayvec.workspace = true
hash-db.workspace = true
plain_hasher.workspace = true
arbitrary = { workspace = true, features = ["derive"] }
proptest.workspace = true
proptest-arbitrary-interop.workspace = true
criterion.workspace = true
bincode = { workspace = true, features = ["serde"] }
serde.workspace = true
serde_json.workspace = true
serde_with.workspace = true
revm-state.workspace = true

[features]
default = [ "std" ]
std = [
	"alloy-consensus/std",
	"alloy-genesis/std",
	"alloy-primitives/std",
	"alloy-rlp/std",
	"alloy-rpc-types-eth?/std",
	"alloy-serde?/std",
	"alloy-trie/std",
	"arrayvec?/std",
	"bytes?/std",
	"derive_more/std",
	"nybbles/std",
	"reth-primitives-traits/std",
	"revm-database/std",
	"revm-state/std",
	"serde?/std",
	"serde_json/std",
	"serde_with?/std",
]
eip1186 = [ "alloy-rpc-types-eth/serde", "dep:alloy-serde" ]
serde = [
	"alloy-consensus/serde",
	"alloy-primitives/serde",
	"alloy-rpc-types-eth?/serde",
	"alloy-trie/serde",
	"arrayvec?/serde",
	"bytes?/serde",
	"dep:serde",
	"nybbles/serde",
	"reth-codecs?/serde",
	"reth-primitives-traits/serde",
	"revm-database/serde",
	"revm-state/serde",
]
reth-codec = [ "dep:arrayvec", "dep:bytes", "dep:reth-codecs" ]
serde-bincode-compat = [
	"alloy-consensus/serde-bincode-compat",
	"alloy-genesis/serde-bincode-compat",
	"alloy-rpc-types-eth?/serde-bincode-compat",
	"dep:serde_with",
	"reth-primitives-traits/serde-bincode-compat",
	"serde",
]
test-utils = [
	"arbitrary",
	"dep:hash-db",
	"dep:plain_hasher",
	"reth-codecs/test-utils",
	"reth-primitives-traits/test-utils",
]
arbitrary = [
	"alloy-consensus/arbitrary",
	"alloy-primitives/arbitrary",
	"alloy-rpc-types-eth?/arbitrary",
	"alloy-serde?/arbitrary",
	"alloy-trie/arbitrary",
	"dep:arbitrary",
	"dep:reth-codecs",
	"nybbles/arbitrary",
	"reth-codecs/arbitrary",
	"reth-primitives-traits/arbitrary",
	"std",
]
rayon = [ "dep:rayon" ]

[[bench]]
name = "prefix_set"
harness = false

[[bench]]
name = "hashed_state"
harness = false
required-features = ["rayon"]
