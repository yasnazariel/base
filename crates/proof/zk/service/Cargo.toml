[package]
name = "base-zk-service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
base-zk-db.workspace = true
base-zk-outbox.workspace = true
base-zk-client = { workspace = true, features = ["server"] }

# Succinct / SP1
base-succinct-elfs.workspace = true
base-succinct-host-utils.workspace = true
base-succinct-proof-utils.workspace = true
base-succinct-client-utils.workspace = true
base-succinct-ethereum-host-utils.workspace = true
sp1-sdk.workspace = true 
sp1-prover-types.workspace = true
sp1-cluster-utils.workspace = true
sp1-cluster-common.workspace = true
sp1-cluster-artifact.workspace = true

# Network
base-common-network.workspace = true
alloy-primitives.workspace = true
alloy-provider.workspace = true
alloy-rpc-types.workspace = true

async-trait.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "time"] }

tonic.workspace = true

reqwest = { workspace = true, features = ["json"] }
tower-http = { workspace = true, features = ["trace"] }
axum = { workspace = true, features = ["tokio", "http1"] }
