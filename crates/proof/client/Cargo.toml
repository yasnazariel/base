[package]
name = "base-proof-client"
description = "Proof client types for the Base proof program"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[dependencies]
spin.workspace = true
tracing.workspace = true
alloy-evm.workspace = true
base-proof.workspace = true
thiserror.workspace = true
base-protocol.workspace = true
alloy-consensus.workspace = true
base-evm = { workspace = true, features = ["alloy"] }
alloy-primitives.workspace = true
base-proof-driver.workspace = true
base-proof-executor.workspace = true
base-proof-preimage.workspace = true
base-alloy-consensus.workspace = true
base-consensus-derive.workspace = true
base-consensus-genesis.workspace = true

[dev-dependencies]
rstest.workspace = true
tokio = { workspace = true, features = ["full"] }

[features]
std = [
	"alloy-consensus/std",
	"alloy-evm/std",
	"alloy-primitives/std",
	"base-alloy-consensus/std",
	"base-consensus-genesis/std",
	"base-evm/std",
	"base-proof-driver/std",
	"base-proof-executor/std",
	"base-proof-preimage/std",
	"base-proof/std",
	"base-protocol/std",
	"spin/std",
	"thiserror/std",
	"tracing/std",
]
