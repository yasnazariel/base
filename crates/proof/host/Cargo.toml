[package]
name = "base-proof-host"
description = "Generic host-side infrastructure for the Base fault proof host."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[dependencies]
# base
base-protocol.workspace = true
base-common-consensus.workspace = true
base-proof-mpt.workspace = true
base-common-evm.workspace = true
base-common-network.workspace = true
base-consensus-providers.workspace = true
base-proof = { workspace = true, features = ["std"] }
base-proof-client = { workspace = true, features = ["std"] }
base-proof-preimage = { workspace = true, features = ["std"] }
base-proof-primitives = { workspace = true, features = ["serde", "std"] }
base-consensus-genesis = { workspace = true, features = ["serde", "std"] }
base-common-rpc-types-engine = { workspace = true, features = ["serde", "std"] }

# alloy
alloy-rlp.workspace = true
alloy-eips.workspace = true
alloy-genesis.workspace = true
alloy-network.workspace = true
alloy-provider.workspace = true
alloy-transport.workspace = true
alloy-primitives.workspace = true
alloy-rpc-types-beacon.workspace = true
alloy-consensus = { workspace = true, features = ["std"] }
alloy-rpc-types = { workspace = true, features = ["debug"] }

# async
tokio.workspace = true
backon.workspace = true

# crypto
ark-ff.workspace = true

# misc
serde.workspace = true
tracing.workspace = true
dashmap.workspace = true
thiserror.workspace = true
serde_json.workspace = true
async-trait.workspace = true
base-metrics.workspace = true

# `metrics` feature
metrics = { workspace = true, optional = true }

# optional - precompiles
revm = { workspace = true, optional = true, features = ["std", "c-kzg", "secp256k1", "portable", "blst"] }

# optional - disk
rocksdb = { workspace = true, optional = true, features = ["snappy", "bindgen-runtime"] }

[dev-dependencies]
proptest.workspace = true
alloy-json-rpc.workspace = true

[features]
disk = [ "dep:rocksdb" ]
metrics = [
	"base-consensus-providers/metrics",
	"base-metrics/metrics",
	"dep:metrics",
]
precompiles = [ "dep:revm" ]
