[package]
name = "base-proof-primitives"
description = "Shared primitive types and traits for the Base proof system"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[dependencies]
# General
thiserror.workspace = true
async-trait.workspace = true
alloy-eips = { workspace = true }
alloy-chains = { workspace = true }
alloy-primitives = { workspace = true }
base-proof-preimage = { workspace = true }
base-consensus-genesis = { workspace = true }
jsonrpsee = { workspace = true, optional = true }
serde = { workspace = true, optional = true, features = ["derive"] }

[dev-dependencies]
hex.workspace = true
rstest.workspace = true
serde_json = { workspace = true, features = ["std"] }

[features]
default = []
std = [
	"alloy-chains/std",
	"alloy-eips/std",
	"alloy-primitives/std",
	"base-consensus-genesis/std",
	"base-proof-preimage/std",
	"serde?/std",
	"thiserror/std",
]
serde = [
	"alloy-chains/serde",
	"alloy-eips/serde",
	"alloy-primitives/serde",
	"base-consensus-genesis/serde",
	"base-proof-preimage/serde",
	"dep:serde",
]
rpc-server = [
	"dep:jsonrpsee",
	"jsonrpsee/macros",
	"jsonrpsee/server",
	"serde",
	"std",
]
rpc-client = [
	"dep:jsonrpsee",
	"jsonrpsee/http-client",
	"jsonrpsee/macros",
	"serde",
	"std",
]
