[package]
name = "base-proof-tee-nitro-enclave"
description = "Nitro Enclave runtime, types, and proving logic."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# base
base-common-evm.workspace = true
base-common-chains.workspace = true
base-proof = { workspace = true, features = ["std"] }
base-proof-client = { workspace = true, features = ["std"] }
base-proof-preimage = { workspace = true, features = ["serde"] }
base-proof-primitives = { workspace = true, features = ["serde"] }
base-consensus-genesis = { workspace = true, features = ["serde"] }

# alloy
alloy-chains.workspace = true
alloy-signer.workspace = true
alloy-primitives.workspace = true
alloy-signer-local.workspace = true
alloy-eips = { workspace = true, features = ["serde"] }

# crypto
sha2.workspace = true
k256 = { workspace = true, features = ["ecdsa", "arithmetic"] }

# nsm
aws-nitro-enclaves-nsm-api.workspace = true

# encoding
serde = { workspace = true, features = ["derive"] }
bincode = { workspace = true, features = ["serde"] }

# async
async-trait.workspace = true
tokio = { workspace = true, features = ["rt", "time", "io-util"] }

# misc
tracing.workspace = true
rand_08.workspace = true
thiserror.workspace = true
parking_lot.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
eyre.workspace = true
tokio-vsock.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread"] }

[dev-dependencies]
hex.workspace = true
serde_json.workspace = true
base-consensus-registry.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }

[package.metadata.cargo-udeps.ignore]
normal = ["aws-nitro-enclaves-nsm-api"]
