[package]
name = "base-bin"
description = "Unified Base EL + CL binary"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "base"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
# workspace
base-metering.workspace = true
base-reth-cli.workspace = true
base-cli-utils.workspace = true
base-node-core.workspace = true
base-client-cli.workspace = true
base-txpool-rpc.workspace = true
base-flashblocks.workspace = true
base-node-runner.workspace = true
base-alloy-chains.workspace = true
base-consensus-rpc.workspace = true
base-txpool-tracing.workspace = true
base-consensus-peers.workspace = true
base-bundle-extension.workspace = true
base-flashblocks-node.workspace = true
base-consensus-genesis.workspace = true
base-consensus-registry.workspace = true
base-execution-chainspec.workspace = true
base-consensus-node = { workspace = true, features = ["metrics"] }

# alloy
alloy-genesis.workspace = true
alloy-primitives.workspace = true
alloy-rpc-types-engine.workspace = true

# reth
reth-db.workspace = true
reth-tasks.workspace = true
reth-cli-util.workspace = true
reth-node-core.workspace = true
reth-node-builder.workspace = true
reth-network-peers.workspace = true
reth-rpc-server-types.workspace = true

# cli
url.workspace = true
clap.workspace = true
serde.workspace = true
serde_json.workspace = true

# misc
eyre.workspace = true
tokio.workspace = true
tempfile.workspace = true
tracing = { workspace = true, features = ["std"] }

[dev-dependencies]
rstest.workspace = true
serial_test.workspace = true

[features]
default = [ "jemalloc" ]
jemalloc = [ "reth-cli-util/jemalloc" ]
