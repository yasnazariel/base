[package]
name = "base-prover-zk"
description = "ZK prover service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "base-prover-zk"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
# Workspace – ZK
base-zk-db.workspace = true
base-zk-outbox.workspace = true
base-zk-service.workspace = true
base-zk-client = { workspace = true, features = ["server"] }

# Workspace – Succinct / SP1
base-succinct-host-utils.workspace = true
base-succinct-proof-utils.workspace = true
sp1-cluster-common.workspace = true
sp1-cluster-artifact.workspace = true
sp1-sdk.workspace = true

# CLI
eyre.workspace = true
base-cli-utils.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
serde = { workspace = true, features = ["derive", "std"] }

# Async
futures.workspace = true
tokio = { workspace = true, features = ["full"] }

# gRPC
tonic.workspace = true
tonic-web.workspace = true
tonic-reflection.workspace = true

# HTTP
http.workspace = true
tower-http = { workspace = true, features = ["cors"] }

# Tracing
tracing.workspace = true
